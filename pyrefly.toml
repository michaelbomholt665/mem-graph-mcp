# Pyrefly Configuration
# Optimized for src-layout projects

[project]
name = "memory"
root = "."
# We only want to check the package source
src = ["src"]
# Ignore all .pyi files in the project
project-excludes = ["**/*.pyi"]

[check]
python-version = "3.14"
venv = ".venv"
venv-path = "."
# Since we explicitly type everything, we use strict mode
strict = true

